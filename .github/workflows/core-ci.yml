name: core-ci

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:

permissions:
  contents: read

env:
  RUSTFLAGS: "-Dwarnings"

jobs:
  rust-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        run: |
          # Install toolchain and components from rust-toolchain.toml (profile = "default" includes rustfmt, clippy)
          rustup show

      - name: Cargo format check
        run: cargo fmt --all -- --check

      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets --all-features --locked

      - name: Cargo check
        run: cargo check --workspace --locked

      - name: Cargo test
        run: cargo test --workspace --locked

  # Smoke test: ensure workspace is packageable for release
  package-smoke-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        run: rustup show

      - name: Cargo package (smoke test)
        run: cargo package --workspace --locked --allow-dirty
