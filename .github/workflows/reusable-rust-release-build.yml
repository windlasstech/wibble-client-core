name: reusable-rust-release-build
#
# SLSA Level 3 Trusted Build Boundary
#
# This reusable workflow is the ONLY authorized build path for release artifacts.
# It enforces hermetic builds with locked dependencies and generates attestations.
#
# Reference: docs/architecture/slsa-level-3-release.md

on:
  workflow_call:
    inputs:
      artifact_mode:
        description: 'Build mode for release artifacts'
        default: 'crate-only'
        type: string
    outputs:
      base64-subjects:
        description: 'Base64-encoded checksums of release subjects for SLSA generator'
        value: ${{ jobs.build-release-subjects.outputs.base64-subjects }}
      artifact-name:
        description: 'Name of the uploaded artifact'
        value: ${{ jobs.build-release-subjects.outputs.artifact-name }}
      checksums-path:
        description: 'Path to subject checksums file'
        value: ${{ jobs.build-release-subjects.outputs.checksums-path }}
      sbom-path:
        description: 'Path to generated SBOM file'
        value: ${{ jobs.sbom-and-attest.outputs.sbom-path }}

env:
  RUSTFLAGS: "-Dwarnings"

permissions:
  contents: read

jobs:
  build-release-subjects:
    name: Build Release Subjects
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      base64-subjects: ${{ steps.generate-checksums.outputs.base64-subjects }}
      artifact-name: ${{ steps.upload.outputs.artifact-name }}
      checksums-path: ${{ steps.generate-checksums.outputs.checksums-path }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Rust toolchain
        run: rustup show

      - name: Verify workspace consistency
        run: |
          # Ensure all crate versions are consistent before packaging
          cargo metadata --format-version 1 --no-deps > /dev/null

      - name: Run tests (locked)
        run: cargo test --workspace --locked

      - name: Build release (locked)
        run: cargo build --workspace --release --locked

      - name: Package crates (locked)
        run: cargo package --workspace --locked

      - name: Stage release artifacts
        run: |
          mkdir -p dist/
          # Copy packaged .crate files as primary release subjects
          cp target/package/*.crate dist/
          ls -la dist/

      - name: Generate subject checksums
        id: generate-checksums
        run: |
          cd dist/
          # Generate SHA256 checksums for all release subjects
          sha256sum *.crate > subject.checksums.txt
          echo "Checksums:"
          cat subject.checksums.txt
          
          # Output for GitHub Actions
          echo "checksums-path=dist/subject.checksums.txt" >> "$GITHUB_OUTPUT"
          
          # Generate base64-encoded subjects for SLSA generator
          # Format: sha256:hex_digest <filename> (one per line, base64 encoded)
          base64_subjects=$(sha256sum *.crate | awk '{print "sha256:" $1 " " $2}' | base64 -w0)
          echo "base64-subjects=${base64_subjects}" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-subjects
          path: dist/
          retention-days: 30
          if-no-files-found: error

      - name: Set artifact name output
        run: echo "artifact-name=release-subjects" >> "$GITHUB_OUTPUT"

  sbom-and-attest:
    name: Generate SBOM and Attestations
    needs: build-release-subjects
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      sbom-path: ${{ steps.generate-sbom.outputs.sbom-path }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-subjects
          path: dist/

      - name: Generate SBOM
        id: generate-sbom
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: dist/wibble-client-core.spdx.json

      - name: Attest provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: dist/subject.checksums.txt
          show-summary: true

      - name: Attest SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: dist/subject.checksums.txt
          sbom-path: dist/wibble-client-core.spdx.json
          show-summary: true

      - name: Upload updated artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-subjects
          path: dist/
          retention-days: 30
          if-no-files-found: error
          overwrite: true
